<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- card stock with its cut edge -->
  <rect width="32" height="32" fill="#fbf7ec"/>
  <rect x="0.5" y="0.5" width="31" height="31" fill="none" stroke="#d8d0bc"/>
  <!-- the highlighter swipe (0.55-alpha yellow flattened onto paper) -->
  <rect x="3.5" y="11" width="25" height="11.5" fill="#fae993" transform="rotate(-4 16 17)"/>
  <!-- the italic g from the wordmark -->
  <text x="15" y="22.5" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif" font-style="italic" font-size="26" fill="#1c2433">g</text>
</svg>
